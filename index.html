<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1e1e2e', 900: '#11111b', 700: '#313244', 600: '#45475a' },
                        primary: '#cba6f7',
                        accent: '#f38ba8',
                        success: '#a6e3a1'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen font-sans selection:bg-primary selection:text-dark-900 relative pb-20">

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none px-4"></div>

    <div class="max-w-4xl mx-auto p-4 md:p-6">
        <header class="text-center py-6 mb-8 border-b border-dark-700">
            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-primary via-pink-400 to-accent bg-clip-text text-transparent">
                <i class="fa-solid fa-cloud-arrow-down mr-2"></i>Universal Video Downloader
            </h1>
            <p class="text-gray-400 mt-2 text-sm">Tải video đa nền tảng tốc độ cao • Không pop-up • Vượt rào CORS mượt mà</p>
        </header>

        <div class="bg-dark-800 p-6 rounded-2xl shadow-2xl border border-dark-700 mb-8">
            <label class="block text-sm font-semibold mb-2 text-primary">Nhập liên kết video:</label>
            
            <div class="flex flex-col md:flex-row gap-3 mb-4">
                <div class="relative flex-1">
                    <input type="text" id="videoUrl" placeholder="Dán link YouTube, TikTok, Facebook, Instagram..." 
                        class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-primary transition pl-11 pr-10 shadow-inner">
                    <i class="fa-solid fa-link absolute left-4 top-4 text-gray-500"></i>
                </div>
                
                <div class="flex gap-2 justify-end flex-wrap">
                    <button onclick="smartPaste()" id="btnPaste" type="button" class="bg-dark-700 hover:bg-dark-600 active:scale-95 px-4 py-3 rounded-xl transition font-medium flex items-center gap-2 border border-dark-600 text-sm">
                        <i class="fa-regular fa-clipboard text-primary"></i> <span>Paste</span>
                    </button>
                    <button onclick="smartCopy()" id="btnCopy" type="button" class="bg-dark-700 hover:bg-dark-600 active:scale-95 px-4 py-3 rounded-xl transition font-medium flex items-center gap-2 border border-dark-600 text-sm">
                        <i class="fa-regular fa-copy text-yellow-400"></i> <span id="copyText">Copy</span>
                    </button>
                    <button onclick="clearUrl()" type="button" class="bg-dark-700 hover:bg-red-500/20 active:scale-95 px-4 py-3 rounded-xl transition font-medium flex items-center gap-2 border border-dark-600 hover:border-red-500/50 text-red-400 text-sm">
                        <i class="fa-solid fa-eraser"></i> <span>Xóa</span>
                    </button>
                    <button onclick="addUrlToQueue()" type="button" class="bg-dark-700 hover:bg-emerald-500/20 active:scale-95 px-4 py-3 rounded-xl transition font-medium flex items-center gap-2 border border-dark-600 hover:border-emerald-500/50 text-success text-sm">
                        <i class="fa-solid fa-plus"></i> <span>Thêm</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between pt-3 border-t border-dark-700/60">
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <span class="text-sm text-gray-400 whitespace-nowrap"><i class="fa-solid fa-sliders mr-1.5 text-primary"></i>Chất lượng:</span>
                    <select id="qualitySelect" class="bg-dark-900 border border-dark-600 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary text-white w-full sm:w-auto">
                        <option value="best">🔥 Tốt nhất (Tự động)</option>
                        <option value="1080">1080p (Full HD)</option>
                        <option value="720">720p (HD)</option>
                        <option value="480">480p</option>
                        <option value="audio">🎵 Chỉ tải Âm thanh (MP3)</option>
                    </select>
                </div>

                <button onclick="fetchVideo()" id="downloadBtn" type="button"
                    class="w-full sm:w-auto bg-gradient-to-r from-primary to-accent hover:opacity-95 active:scale-95 text-dark-900 font-bold px-8 py-3.5 rounded-xl shadow-lg shadow-primary/20 transition duration-150 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-bolt"></i> Phân Tích & Tải
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden bg-dark-800 p-6 rounded-2xl shadow-2xl border border-dark-700 mb-8 transition-all"></div>

        <div class="bg-dark-800 p-6 rounded-2xl shadow-2xl border border-dark-700">
            <div class="flex justify-between items-center mb-4 pb-3 border-b border-dark-700">
                <h3 class="font-bold text-lg text-white flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-primary"></i> Lịch Sử & Danh Sách Chờ
                </h3>
                <button onclick="clearHistory()" type="button" class="text-xs text-red-400 hover:underline flex items-center gap-1"><i class="fa-solid fa-trash"></i> Xóa lịch sử</button>
            </div>
            <div id="historyList" class="space-y-3 max-h-80 overflow-y-auto pr-1"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let historyData = JSON.parse(localStorage.getItem('videoHistory') || '[]');
        renderHistory();

        // --- 1. HỆ THỐNG TOAST NOTIFICATION (THAY THẾ ALERT/PROMPT) ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-emerald-500 text-dark-900 font-semibold',
                error: 'bg-red-500 text-white font-semibold',
                info: 'bg-primary text-dark-900 font-semibold'
            };
            const icons = {
                success: 'fa-circle-check',
                error: 'fa-circle-exclamation',
                info: 'fa-circle-info'
            };

            toast.className = `toast-animate pointer-events-auto flex items-center gap-3 px-4 py-3.5 rounded-xl shadow-2xl border border-white/10 text-sm ${colors[type] || colors.info}`;
            toast.innerHTML = `<i class="fa-solid ${icons[type]} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- 2. XỬ LÝ NÚT COPY & PASTE SIÊU MƯỢT ---
        async function smartPaste() {
            const input = document.getElementById('videoUrl');
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    input.value = text;
                    showToast('Đã dán liên kết thành công!', 'success');
                } else {
                    showToast('Clipboard đang trống!', 'error');
                }
            } catch (err) {
                // Trình duyệt chặn quyền tự động -> Focus vào ô và báo nhẹ nhàng
                input.focus();
                showToast('Hãy nhấn Ctrl + V (hoặc Nhấn giữ -> Dán) vào ô trống!', 'info');
            }
        }

        async function smartCopy() {
            const input = document.getElementById('videoUrl');
            if (!input.value.trim()) {
                return showToast('Không có liên kết để sao chép!', 'error');
            }
            try {
                await navigator.clipboard.writeText(input.value);
                const copyText = document.getElementById('copyText');
                copyText.innerText = 'Đã chép!';
                copyText.classList.add('text-success');
                showToast('Đã sao chép vào Clipboard!', 'success');
                
                setTimeout(() => {
                    copyText.innerText = 'Copy';
                    copyText.classList.remove('text-success');
                }, 2000);
            } catch (err) {
                input.select();
                document.execCommand('copy');
                showToast('Đã sao chép liên kết!', 'success');
            }
        }

        function clearUrl() {
            document.getElementById('videoUrl').value = '';
            document.getElementById('resultArea').classList.add('hidden');
            showToast('Đã xóa ô nhập!', 'info');
        }

        // --- 3. QUẢN LÝ LỊCH SỬ & HÀNG ĐỢI ---
        function addUrlToQueue() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) return showToast('Vui lòng nhập liên kết video trước!', 'error');
            saveToHistory('⏳ Chờ xử lý: ' + url.substring(0, 35) + '...', url, 'Hàng đợi');
            clearUrl();
            showToast('Đã thêm vào danh sách chờ!', 'success');
        }

        function saveToHistory(title, url, platform = 'N/A', thumbnail = null) {
            historyData = historyData.filter(item => item.url !== url); // Xóa trùng
            historyData.unshift({ title, url, platform, thumbnail, time: new Date().toLocaleTimeString('vi-VN') });
            if (historyData.length > 20) historyData.pop();
            localStorage.setItem('videoHistory', JSON.stringify(historyData));
            renderHistory();
        }

        function deleteHistoryItem(index) {
            historyData.splice(index, 1);
            localStorage.setItem('videoHistory', JSON.stringify(historyData));
            renderHistory();
            showToast('Đã xóa khỏi danh sách!', 'info');
        }

        function clearHistory() {
            if (historyData.length === 0) return;
            historyData = [];
            localStorage.removeItem('videoHistory');
            renderHistory();
            showToast('Đã làm sạch lịch sử!', 'success');
        }

        function loadFromHistory(url) {
            document.getElementById('videoUrl').value = url;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchVideo();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (historyData.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm text-center py-6">Chưa có lịch sử hoặc danh sách chờ nào.</p>';
                return;
            }
            container.innerHTML = historyData.map((item, idx) => `
                <div class="flex items-center justify-between bg-dark-900/90 p-3 rounded-xl border border-dark-700/60 hover:border-dark-600 transition group">
                    <div class="flex items-center gap-3 overflow-hidden cursor-pointer flex-1" onclick="loadFromHistory('${item.url}')">
                        ${item.thumbnail ? `<img src="${item.thumbnail}" class="w-14 h-10 object-cover rounded-lg flex-shrink-0 bg-dark-700">` : `<div class="w-14 h-10 bg-dark-700 rounded-lg flex items-center justify-center text-primary flex-shrink-0"><i class="fa-solid fa-video"></i></div>`}
                        <div class="overflow-hidden">
                            <h4 class="font-medium text-sm truncate text-gray-200 group-hover:text-primary transition" title="${item.title}">${item.title}</h4>
                            <p class="text-xs text-gray-500 truncate mt-0.5">${item.platform} • <span class="text-primary underline">Nhấp để tải</span></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                        <button onclick="deleteHistoryItem(${idx})" title="Xóa" type="button" class="p-2 text-gray-500 hover:text-red-400 transition rounded-lg hover:bg-dark-800"><i class="fa-solid fa-xmark text-base"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // --- 4. HÀM TẢI VIDEO XỬ LÝ TRIỆT ĐỂ CORS ---
        async function fetchVideo() {
            const urlInput = document.getElementById('videoUrl');
            const url = urlInput.value.trim();
            const quality = document.getElementById('qualitySelect').value;
            const resultArea = document.getElementById('resultArea');
            const btn = document.getElementById('downloadBtn');

            if (!url) return showToast('Vui lòng nhập liên kết video!', 'error');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Đang xử lý...</span>';
            btn.disabled = true;
            resultArea.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/extract?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (!res.ok || !data.success) {
                    throw new Error(data.detail || 'Không thể đọc link này. Link có thể ở chế độ riêng tư.');
                }

                saveToHistory(data.title, url, data.platform, data.thumbnail);

                let selectedUrl = data.direct_url;
                if (quality !== 'best' && data.formats && data.formats.length > 0) {
                    const match = data.formats.find(f => quality === 'audio' ? !f.has_video : f.quality.includes(quality));
                    if (match) selectedUrl = match.url;
                }

                // Làm sạch tên file để tải xuống không lỗi
                const safeTitle = (data.title || "video").replace(/[^a-zA-Z0-9 ÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂẠẢẤẦẨẪẬẮẰẲẴẶẸẺẼỀỀỂưăạảấầẩẫậắằẳẵặẹẻẽềềểỄỆỈỊỌỎỐỒỔỖỘỚỜỞỠỢỤỦỨỪễệỉịọỏốồổỗộớờởỡợụủứừỬỮỰỲỴÝỶỸửữựỳỵỷỹ_-]/g, "").trim();
                const proxyUrl = `${API_BASE}/proxy?url=${encodeURIComponent(selectedUrl)}&filename=${encodeURIComponent(safeTitle + '.mp4')}`;

                resultArea.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-6 items-center">
                        ${data.thumbnail ? `<img src="${data.thumbnail}" class="w-full md:w-48 h-32 object-cover rounded-xl shadow-md border border-dark-600">` : ''}
                        <div class="flex-1 text-center md:text-left overflow-hidden w-full">
                            <span class="text-xs font-bold uppercase tracking-wider bg-primary/20 text-primary px-3 py-1 rounded-full border border-primary/30">${data.platform || 'Video'}</span>
                            <h3 class="text-lg font-bold text-white mt-2 mb-1 truncate" title="${data.title}">${data.title}</h3>
                            <p class="text-sm text-gray-400 mb-5">Chất lượng đã chọn: <strong class="text-success">${quality === 'best' ? 'Tốt nhất (Mặc định)' : quality}</strong></p>
                            
                            <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                                <button onclick="triggerDirectDownload('${selectedUrl}', '${safeTitle}.mp4')" type="button"
                                    class="bg-success hover:bg-success/80 active:scale-95 text-dark-900 font-bold px-6 py-3 rounded-xl transition flex items-center gap-2 shadow-lg shadow-success/10 text-sm">
                                    <i class="fa-solid fa-bolt"></i> Tải Trực Tiếp (Tốc Độ Cao)
                                </button>
                                
                                <a href="${proxyUrl}" target="_self"
                                    class="bg-gradient-to-r from-amber-500 to-orange-600 hover:opacity-90 active:scale-95 text-white font-medium px-5 py-3 rounded-xl transition flex items-center gap-2 shadow-md text-sm">
                                    <i class="fa-solid fa-shield-halved"></i> Tải Qua Proxy (Vượt CORS 100%)
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                resultArea.classList.remove('hidden');
                showToast('Phân tích thành công! Hãy chọn cách tải bên dưới.', 'success');

            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i> <span>Phân Tích & Tải</span>';
                btn.disabled = false;
            }
        }

        // --- 5. TUYỆT CHIÊU FORCE DOWNLOAD TRỰC TIẾP KHÔNG BỊ MỞ TAB MỚI ---
        function triggerDirectDownload(url, filename) {
            showToast('Đang bắt đầu tải xuống trực tiếp...', 'info');
            
            // Tạo một thẻ a ẩn và ép thuộc tính download
            const a = document.createElement('a');
            a.href = url;
            a.setAttribute('download', filename);
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // Nhắc nhở người dùng nếu CDN của trình duyệt bắt mở tab mới
            setTimeout(() => {
                showToast('Mẹo: Nếu trình duyệt tự mở video thay vì tải, hãy dùng nút "Tải Qua Proxy"! ', 'info');
            }, 3000);
        }
    </script>
</body>
</html>
